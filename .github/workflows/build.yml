name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build APK
      run: ./gradlew assembleRelease
    
    - name: Find all APK and AAB files
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null
        echo "=== Searching for AAB files ==="
        find . -name "*.aab" -type f 2>/dev/null
        echo "=== Full build output structure ==="
        find app/build/outputs -type f 2>/dev/null || echo "No outputs directory"
    
    - name: Upload all APKs
      uses: actions/upload-artifact@v4
      with:
        name: LAN_Scan_APK
        path: |
          **/*.apk
          **/*.aab
